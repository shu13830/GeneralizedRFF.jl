name: Register Package
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to register (leave empty to use Project.toml version)'
        required: false
        default: ''

jobs:
  register:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/RegisterAction@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
