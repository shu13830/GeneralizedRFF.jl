name: Register Package
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to register (e.g., 0.1.0, or "patch"/"minor"/"major")'
        required: true
        default: '0.1.0'

jobs:
  register:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/RegisterAction@v0.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: ${{ inputs.version }}
